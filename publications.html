<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mário Raia Neto, BSc.</title>
    <link rel="icon" href="favicon.ico" type="eso1907a2.jpg">
    <style>
        @font-face {
            font-family: 'Futura PT Custom';
            src: url('./fonts/futura-pt-light.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
        }

        :root {
            --bg-color: rgba(0, 0, 0, 0.45); /* Opacidade da imagem de fundo */
            --text-color: #ffffff;
            --hover-bg-color: #ffffff;
            --hover-text-color: #000000;
            --font-main: 'Futura PT Custom', sans-serif;
            --font-secondary: 'Futura PT Custom', sans-serif;
        }

    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(rgba(10, 4, 4, 0.45), rgba(10, 4, 4, 0.45)); /* Gradiente de cor com opacidade */
        background-size: cover; /* Faz a cor ocupar todo o viewport */
        background-position: center;
        background-attachment: fixed; /* Fixa a cor no scroll */
        color: var(--text-color);
        font-family: var(--font-main);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
    }

        .content {
            text-align: center;
            padding: 1rem;
            backdrop-filter: blur(5px); /* Desfoque atrás do conteúdo */
        }

        h1 {
            font-size: 3rem;
            font-family: var(--font-main);
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-family: var(--font-secondary);
            letter-spacing: 1.5px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-family: var(--font-secondary);
            font-size: 1rem;
            letter-spacing: 1.2px;
            transition: background-color 0.3s, color 0.3s, padding 0.3s;
            padding: 0.5rem 1rem; /* Espaçamento uniforme */
            border: 2px solid transparent; /* Borda inicial transparente */
            display: inline-block; /* Necessário para alinhamento */
            text-align: center; /* Centraliza o texto horizontalmente */
            line-height: 1.5; /* Alinha verticalmente dentro do botão */
        }

        nav a:not(:last-child)::after {
            content: '|';
            color: var(--text-color);
            margin: 0 0.5rem; /* Espaço igual à esquerda e à direita */
            vertical-align: middle; /* Alinha verticalmente com o texto */
        }

        nav a:hover {
            background-color: var(--hover-bg-color);
            color: var(--hover-text-color);
            border: 2px solid var(--hover-bg-color); /* Garante simetria no hover */
            padding: 0.5rem 1rem; /* Mantém o espaçamento no hover */
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0; /* Remove o gap para evitar inconsistências nos separadores */
        }

        .home-button {
            position: absolute; /* Para posicionamento no canto */
            top: 1rem; /* Distância do topo */
            left: 1rem; /* Distância da borda esquerda */
            font-family: var(--font-main);
            font-size: 1rem;
            color: var(--text-color);
            text-decoration: none;
            background-color: transparent;
            padding: 0.5rem 1rem; /* Adiciona espaçamento ao botão */
            border: 2px solid transparent; /* Inicialmente sem borda visível */
            transition: background-color 0.3s, color 0.3s, border 0.3s; /* Suaviza as alterações */
        }

        .home-button:hover {
            background-color: var(--hover-bg-color); /* Altera a cor de fundo no hover */
            color: var(--hover-text-color); /* Altera a cor do texto no hover */
            border: 2px solid var(--hover-bg-color); /* Aplica a borda no hover */
        }

        /* Media Queries para responsividade */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            h2 {
                font-size: 1.2rem;
                margin-bottom: 1.5rem;
            }

            nav a {
                font-size: 0.9rem;
                padding: 0.4rem 0.8rem;
            }
        }

        @media (max-width: 480px) {
            body {
                background-attachment: scroll;
            }

            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1rem;
            }

            nav {
                flex-direction: column;
                gap: 0.8rem;
            }

            nav a {
                font-size: 1rem;
                padding: 0.6rem 1rem;
            }

            nav a:not(:last-child)::after {
                content: ''; /* Remove o separador em telas pequenas */
            }
        }

        @media (orientation: landscape) {
            h1 {
                font-size: 2.8rem;
            }

            h2 {
                font-size: 1.3rem;
            }

            nav a {
                font-size: 1rem;
                padding: 0.5rem 1rem;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="home-button">Home</a>
    <div class="content">
        <h1>Publications</h1>
        <h2></h2>
    </div>
</body>
</html>
