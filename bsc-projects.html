<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mário Raia Neto, BSc.</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        @font-face {
            font-family: 'Futura PT Custom';
            src: url('./fonts/futura-pt-light.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
        }

        :root {
            --bg-color: rgba(0, 0, 0, 1); /* Opacidade da cor de fundo */
            --text-color: #ffffff;
            --hover-bg-color: #ffffff;
            --hover-text-color: #000000;
            --font-main: 'Futura PT Custom', sans-serif;
            --font-secondary: 'Futura PT Custom', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(10, 4, 4, 1), rgba(10, 4, 4, 1)); /* Gradiente de cor */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .content {
            text-align: center;
            padding: 1rem;
            backdrop-filter: blur(5px); /* Desfoque atrás do conteúdo */
        }

        h1 {
            font-size: 3rem;
            font-family: var(--font-main);
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-family: var(--font-secondary);
            letter-spacing: 1.5px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-family: var(--font-secondary);
            font-size: 1rem;
            letter-spacing: 1.2px;
            transition: background-color 0.3s, color 0.3s, padding 0.3s;
            padding: 0.5rem 1rem; /* Espaçamento uniforme */
            border: 2px solid transparent;
            display: inline-block;
            text-align: center;
            line-height: 1.5;
        }

        nav a:not(:last-child)::after {
            content: '|';
            color: var(--text-color);
            margin: 0 0.5rem;
            vertical-align: middle;
        }

        nav a:hover {
            background-color: var(--hover-bg-color);
            color: var(--hover-text-color);
            border: 2px solid var(--hover-bg-color);
            padding: 0.5rem 1rem;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
        }

        .home-button {
            position: absolute;
            top: 1rem;
            left: 1rem;
            font-family: var(--font-main);
            font-size: 1rem;
            color: var(--text-color);
            text-decoration: none;
            background-color: transparent;
            padding: 0.5rem 1rem;
            border: 2px solid transparent;
            transition: background-color 0.3s, color 0.3s, border 0.3s;
        }

        .home-button:hover {
            background-color: var(--hover-bg-color);
            color: var(--hover-text-color);
            border: 2px solid var(--hover-bg-color);
        }

        /* Media Queries para responsividade */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            h2 {
                font-size: 1.2rem;
                margin-bottom: 1.5rem;
            }

            nav a {
                font-size: 0.9rem;
                padding: 0.4rem 0.8rem;
            }
        }

        @media (max-width: 480px) {
            body {
                background-attachment: scroll;
            }

            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1rem;
            }

            nav {
                flex-direction: column;
                gap: 0.8rem;
            }

            nav a {
                font-size: 1rem;
                padding: 0.6rem 1rem;
            }

            nav a:not(:last-child)::after {
                content: ''; /* Remove o separador em telas pequenas */
            }
        }

        @media (orientation: landscape) {
            h1 {
                font-size: 2.8rem;
            }

            h2 {
                font-size: 1.3rem;
            }

            nav a {
                font-size: 1rem;
                padding: 0.5rem 1rem;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="home-button">Home</a>
    <a href="publications.html" class="publications-button">Back to Publications</a>
    <div class="content">
        <h1>BSc projects</h1>
        <h2></h2>
    </div>
</body>
</html>
