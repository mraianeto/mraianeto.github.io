<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mário Raia Neto, BSc.</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        @font-face {
            font-family: 'Futura PT Custom';
            src: url('./fonts/futura-pt-light.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
        }

        :root {
            --bg-color: rgba(0, 0, 0, 0.24); /* Opacidade da imagem de fundo */
            --text-color: #ffffff;
            --hover-bg-color: #ffffff;
            --hover-text-color: #000000;
            --font-main: 'Futura PT Custom', sans-serif;
            --font-secondary: 'Futura PT Custom', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: #0a0404 url('eso1907a2.jpg') no-repeat center center;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .content {
            text-align: center;
            padding: 1rem;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 3rem;
            font-family: var(--font-main);
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-family: var(--font-secondary);
            letter-spacing: 1.5px;
        }

    nav a {
        text-decoration: none;
        color: var(--text-color);
        font-family: var(--font-secondary);
        font-size: 1rem;
        letter-spacing: 1.2px;
        transition: background-color 0.3s, color 0.3s, padding 0.3s;
        padding: 0.5rem 1rem; /* Espaçamento uniforme ao redor */
        border: 2px solid transparent; /* Borda inicial transparente */
        display: inline-block; /* Garante alinhamento consistente */
    }

    nav a:not(:last-child)::after {
        content: '|';
        color: var(--text-color);
        margin: 0 0.5rem; /* Espaço igual à esquerda e à direita */
        vertical-align: middle; /* Alinha verticalmente com o texto */
    }

    nav a:hover {
        background-color: var(--hover-bg-color);
        color: var(--hover-text-color);
        border: 2px solid var(--hover-bg-color); /* Garante simetria no hover */
    }

    nav {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0; /* Remove o gap para evitar inconsistências nos separadores */
    }

        /* Media Queries para responsividade */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            h2 {
                font-size: 1.2rem;
                margin-bottom: 1.5rem;
            }

            nav a {
                font-size: 0.9rem;
                padding: 0.4rem 0.8rem;
            }
        }

        @media (max-width: 480px) {
            body {
                background-attachment: scroll;
            }

            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1rem;
            }

            nav {
                flex-direction: column;
                gap: 0.8rem;
            }

            nav a {
                font-size: 1rem;
                padding: 0.6rem 1rem;
            }

            nav a:not(:last-child)::after {
                content: ''; /* Remove o separador em telas pequenas */
            }
        }

        @media (orientation: landscape) {
            h1 {
                font-size: 2.8rem;
            }

            h2 {
                font-size: 1.3rem;
            }

            nav a {
                font-size: 1rem;
                padding: 0.5rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Mário Raia Neto,</h1>
        <h2>Undergraduate student and aspiring black hole physicist.</h2>
        <nav>
            <a href="about.html">ABOUT ME</a>
            <a href="cv.html">CV</a>
            <a href="publications.html">PUBLICATIONS</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </div>
</body>
</html>
