<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mário Raia Neto, BSc.</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        @font-face {
            font-family: 'Futura PT Custom';
            src: url('./fonts/futura-pt-light.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
        }

        :root {
            --bg-color: rgba(0, 0, 0, 0.5);
            --text-color: #ffffff;
            --hover-bg-color: #ffffff;
            --hover-text-color: #000000;
            --font-main: 'Futura PT Custom', sans-serif;
            --font-secondary: 'Futura PT Custom', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-color);
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: url('eso1907a.jpg') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            filter: blur(2px);
        }

        .content {
            text-align: center;
            padding: 1rem;
            backdrop-filter: blur(5px);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            letter-spacing: 1.5px;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 1rem;
            letter-spacing: 1.2px;
            transition: background-color 0.3s, color 0.3s;
            padding: 0.5rem;
        }

        nav a:hover {
            background-color: var(--hover-bg-color);
            color: var(--hover-text-color);
        }

        nav a:not(:last-child)::after {
            content: '|';
            color: var(--text-color);
            margin-left: 1rem;
        }

        /* Media Queries */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            h2 {
                font-size: 1.2rem;
            }

            nav a {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .background {
                background-attachment: scroll;
            }

            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1rem;
            }

            nav {
                flex-direction: column;
                gap: 1rem;
            }

            nav a:not(:last-child)::after {
                content: '';
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="content">
        <h1>Mário Raia Neto,</h1>
        <h2>Undergraduate student and aspiring black hole physicist.</h2>
        <nav>
            <a href="about.html">ABOUT ME</a>
            <a href="cv.html">CV</a>
            <a href="publications.html">PUBLICATIONS</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </div>
    <script>
        // Lazy loading for the background image
        document.addEventListener("DOMContentLoaded", () => {
            const background = document.querySelector('.background');
            background.style.backgroundImage = "url('eso1907a.jpg')";
        });
    </script>
</body>
</html>
