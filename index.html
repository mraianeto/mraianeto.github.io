<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mário Raia Neto, BSc.</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        @font-face {
            font-family: 'Futura PT Custom';
            src: url('./fonts/futura-pt-light.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
        }

        :root {
            --bg-color: #000000; /* Solid black background */
            --text-color: #ffffff;
            --hover-bg-color: #ffffff;
            --hover-text-color: #000000;
            --font-main: 'Futura PT Custom', sans-serif;
            --font-secondary: 'Futura PT Custom', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .content {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-family: var(--font-main);
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem; /* Ajuste para maior espaçamento */
            font-family: var(--font-secondary);
            letter-spacing: 1.5px;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem; /* Espaçamento uniforme */
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-family: var(--font-secondary);
            font-size: 1rem;
            letter-spacing: 1.2px;
            transition: background-color 0.3s, color 0.3s;
            padding: 0.3rem; /* Pequeno padding para hover */
        }

        nav a:hover {
            background-color: var(--hover-bg-color);
            color: var(--hover-text-color);
        }

        /* Adiciona separadores com largura uniforme */
        nav a:not(:last-child)::after {
            content: '|';
            color: var(--text-color);
            margin-left: 1rem;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Mário Raia Neto,</h1>
        <h2>Undergraduate student and aspiring black hole physicist.</h2>
        <nav>
            <a href="about.html">ABOUT ME</a>
            <a href="cv.html">CV</a>
            <a href="publications.html">PUBLICATIONS</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </div>
</body>
</html>
