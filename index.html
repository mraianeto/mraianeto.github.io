<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mário Raia Neto, BSc.</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        @font-face {
            font-family: 'Futura PT Custom';
            src: url('./fonts/futura-pt-light.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
        }

        :root {
            --bg-color: rgba(0, 0, 0, 0.5); /* Opacidade da imagem de fundo */
            --text-color: #ffffff;
            --hover-bg-color: #ffffff;
            --hover-text-color: #000000;
            --font-main: 'Futura PT Custom', sans-serif;
            --font-secondary: 'Futura PT Custom', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: #0a0404 url('eso1907a2.jpg') no-repeat center center; /* Fundo com a nova cor */
            background-size: contain; /* Ajusta a imagem para caber no viewport */
            background-position: center center; /* Centraliza a imagem */
            background-attachment: fixed; /* Mantém o fundo fixo */
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .content {
            text-align: center;
            padding: 1rem;
            backdrop-filter: blur(5px); /* Adiciona um efeito de desfoque no fundo atrás do conteúdo */
        }

        h1 {
            font-size: 3rem;
            font-family: var(--font-main);
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 3rem; /* Aumenta o espaço entre o subtítulo e os botões */
            font-family: var(--font-secondary);
            letter-spacing: 1.5px;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap; /* Permite quebra de linha em telas menores */
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-family: var(--font-secondary);
            font-size: 1rem;
            letter-spacing: 1.2px;
            transition: background-color 0.3s, color 0.3s;
            padding: 0.3rem;
        }

        nav a:hover {
            background-color: var(--hover-bg-color);
            color: var(--hover-text-color);
        }

        nav a:not(:last-child)::after {
            content: '|';
            color: var(--text-color);
            margin-left: 1rem;
        }

        /* Media Queries para responsividade */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem; /* Reduz o tamanho do título */
            }

            h2 {
                font-size: 1.2rem; /* Reduz o tamanho do subtítulo */
                margin-bottom: 2rem; /* Ajusta o espaçamento para telas menores */
            }

            nav a {
                font-size: 1rem; /* Tamanho de fonte ajustado */
                padding: 0.5rem; /* Ajuste de padding */
            }
        }

        @media (max-width: 480px) {
            body {
                background-attachment: scroll; /* Garante que o fundo se ajuste em dispositivos móveis */
            }

            h1 {
                font-size: 2rem; /* Reduz o tamanho do título */
            }

            h2 {
                font-size: 1rem; /* Reduz o subtítulo */
            }

            nav {
                flex-direction: column; /* Alinha os itens do menu em uma coluna */
                gap: 1rem; /* Aumenta o espaçamento entre os itens */
            }

            nav a {
                font-size: 1rem; /* Ajusta o tamanho do texto */
                padding: 0.8rem; /* Ajusta o padding para uma área de clique maior */
            }

            nav a:not(:last-child)::after {
                content: ''; /* Remove o separador em telas muito pequenas */
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Mário Raia Neto,</h1>
        <h2>Undergraduate student and aspiring black hole physicist.</h2>
        <nav>
            <a href="about.html">ABOUT ME</a>
            <a href="cv.html">CV</a>
            <a href="publications.html">PUBLICATIONS</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </div>
</body>
</html>
