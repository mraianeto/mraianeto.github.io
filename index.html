<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Raia Neto</title>
    <style>
        @font-face {
            font-family: 'Futura PT Custom';
            src: url('./fonts/futura-pt-light.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
        }

        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --button-color: #444444;
            --font-main: 'Futura PT Custom', sans-serif;
            --font-secondary: 'Futura PT Custom', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: url('https://source.unsplash.com/1600x900/?space,blackhole');
            background-size: cover;
            background-position: center;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .language-buttons {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 5px;
        }

        .language-buttons button {
            background-color: var(--button-color);
            color: var(--text-color);
            font-family: var(--font-secondary);
            font-size: 0.9rem;
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .language-buttons button:hover {
            opacity: 1;
        }

        h1 {
            font-size: 3rem;
            font-family: var(--font-main);
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-family: var(--font-secondary);
            letter-spacing: 1.5px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        a {
            text-decoration: none;
            color: var(--text-color);
            background-color: var(--button-color);
            font-family: var(--font-secondary);
            font-size: 1rem;
            padding: 0.5rem 1.5rem;
            border-radius: 5px;
            transition: background-color 0.3s;
            letter-spacing: 1.2px;
        }

        a:hover {
            background-color: #666666;
        }

        .hidden {
            display: none;
        }

        .page {
            display: none;
            text-align: center;
        }

        .page.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="language-buttons">
        <button onclick="translateTo('pt-BR')">PT-BR</button>
        <button onclick="translateTo('en')">EN</button>
    </div>
    <div id="page-P1" class="content active">
        <h1>Mário Raia Neto,</h1>
        <h2>Undergraduate student and aspiring black hole physicist.</h2>
        <nav>
            <a href="about.html">ABOUT ME</a>
            <a href="cv.html">CV</a>
            <a href="publications.html">PUBLICATIONS</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </div>

    <script>
        function translateTo(lang) {
            // Placeholder function for language translation logic
            alert(`Translate page to: ${lang}`);
        }
    </script>
</body>
</html>
