<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mário Raia Neto, BSc.</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        @font-face {
            font-family: 'Futura PT Custom';
            src: url('./fonts/futura-pt-light.otf') format('opentype');
            font-weight: 300;
            font-style: normal;
        }

        :root {
            --bg-color: rgba(0, 0, 0, 1); /* Opacidade da cor de fundo */
            --text-color: #ffffff;
            --hover-bg-color: #ffffff;
            --hover-text-color: #000000;
            --font-main: 'Futura PT Custom', sans-serif;
            --font-secondary: 'Futura PT Custom', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(10, 4, 4, 1), rgba(10, 4, 4, 1)); /* Gradiente de cor */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .content {
            text-align: center;
            padding: 1rem;
            backdrop-filter: blur(5px); /* Desfoque atrás do conteúdo */
            max-width: 80%;
            margin: 0 auto;
        }

        h1 {
            font-size: 3rem;
            font-family: var(--font-main);
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            font-family: var(--font-secondary);
            letter-spacing: 1.5px;
        }

        /* PDF Container */
        #pdf-viewer {
            width: 100%;
            height: auto;
            border: 1px solid #ccc;
            background-color: #fff;
            overflow: auto;
            padding: 1rem;
        }

        .page-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .page {
            border: 1px solid #ccc;
            margin: 10px;
        }

        /* Download Button */
        .download-btn {
            background-color: var(--hover-bg-color);
            color: var(--hover-text-color);
            font-family: var(--font-main);
            font-size: 1rem;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 2px solid var(--hover-bg-color);
            display: inline-block;
            margin-top: 1rem;
            transition: background-color 0.3s, color 0.3s, border 0.3s;
        }

        .download-btn:hover {
            background-color: var(--text-color);
            color: var(--text-color);
            border: 2px solid var(--text-color);
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-family: var(--font-secondary);
            font-size: 1rem;
            letter-spacing: 1.2px;
            transition: background-color 0.3s, color 0.3s, padding 0.3s;
            padding: 0.5rem 1rem; /* Espaçamento uniforme */
            border: 2px solid transparent;
            display: inline-block;
            text-align: center;
            line-height: 1.5;
        }

        nav a:not(:last-child)::after {
            content: '|';
            color: var(--text-color);
            margin: 0 0.5rem;
            vertical-align: middle;
        }

        nav a:hover {
            background-color: var(--hover-bg-color);
            color: var(--hover-text-color);
            border: 2px solid var(--hover-bg-color);
            padding: 0.5rem 1rem;
        }

        nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0;
        }

        .home-button {
            position: absolute;
            top: 1rem;
            left: 1rem;
            font-family: var(--font-main);
            font-size: 1rem;
            color: var(--text-color);
            text-decoration: none;
            background-color: transparent;
            padding: 0.5rem 1rem;
            border: 2px solid transparent;
            transition: background-color 0.3s, color 0.3s, border 0.3s;
        }

        .home-button:hover {
            background-color: var(--hover-bg-color);
            color: var(--hover-text-color);
            border: 2px solid var(--hover-bg-color);
        }

    </style>
</head>
<body>
    <a href="index.html" class="home-button">Home</a>
    <div class="content">
        <h1>Curriculum Vitae</h1>
        <div id="pdf-viewer"></div>
        <a href="cv.pdf" class="download-btn" download>Download CV</a>
    </div>

    <!-- Include PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.11.338/pdf.min.js"></script>
    
    <script>
        // Path to your PDF file inside the folder (e.g., 'folder/filename.pdf')
        const pdfUrl = './folder/your-pdf-file.pdf'; // Update this path to your PDF file
        
        // PDF.js initialization and rendering function
        const pdfViewer = document.getElementById('pdf-viewer');

        pdfjsLib.getDocument(pdfUrl).promise.then(function(pdf) {
            console.log("PDF loaded");

            // Function to render each page
            const renderPage = function(pageNum) {
                pdf.getPage(pageNum).then(function(page) {
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    const viewport = page.getViewport({ scale: 1.5 });
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const pageContainer = document.createElement('div');
                    pageContainer.classList.add('page-container');
                    pageContainer.appendChild(canvas);
                    pdfViewer.appendChild(pageContainer);

                    page.render({
                        canvasContext: context,
                        viewport: viewport
                    });
                });
            };

            // Render all pages
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                renderPage(pageNum);
            }
        }, function(error) {
            console.error("Error loading PDF: " + error);
        });
    </script>
</body>
</html>
